<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Art System Review</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #fdfbf7;
        color: #2c4130;
        margin: 0;
        padding: 24px;
      }
      header {
        max-width: 1200px;
        margin: 0 auto 32px;
        border-bottom: 2px dashed #e8e3d3;
        padding-bottom: 16px;
      }
      h1 {
        margin: 0 0 8px;
        color: #1e5c2d;
      }
      p.subtitle {
        margin: 0;
        color: #667c69;
        font-size: 14px;
        overflow-wrap: anywhere;
      }
      .review-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        gap: 36px;
      }
      .crop-section {
        background: #fff8dc;
        border: 1px solid #e8dec0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 12px rgba(44, 33, 15, 0.04);
      }
      .crop-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 16px;
        color: #2b541a;
        text-transform: capitalize;
        border-bottom: 1px solid rgba(184, 169, 120, 0.4);
        padding-bottom: 8px;
      }
      .grid-states {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      .state-card {
        background: linear-gradient(180deg, #fffefd 0%, #fff9eb 100%);
        border: 1px solid rgba(184, 169, 120, 0.32);
        border-radius: 8px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.84),
          0 8px 20px rgba(72, 48, 20, 0.05);
      }
      .state-card:hover {
        border-color: #4b9243;
        box-shadow: 0 4px 8px rgba(75, 146, 67, 0.08);
      }
      .crop-preview-wrapper {
        position: relative;
        width: 176px;
        height: 132px;
        background:
          radial-gradient(ellipse at 50% 74%, rgba(121, 83, 42, 0.18) 0%, rgba(121, 83, 42, 0.08) 34%, transparent 62%),
          linear-gradient(180deg, #fff9ea 0%, #f3e5c4 100%);
        border: 1px solid rgba(184, 169, 120, 0.18);
        border-radius: 8px;
        overflow: visible;
        margin-bottom: 12px;
      }
      /* Căn chỉnh chính xác SVG trong wrapper giống hệt iso-tile */
      .crop-preview-wrapper svg.crop-art {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 164px;
        height: 123px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .review-animations-paused .crop-plant,
      .review-animations-paused .carrot-layer,
      .review-animations-paused .corn-layer,
      .review-animations-paused .potato-layer,
      .review-animations-paused .pumpkin-layer,
      .review-animations-paused .strawberry-layer,
      .review-animations-paused .tomato-layer,
      .review-animations-paused .wheat-layer,
      .review-animations-paused .corn-ear,
      .review-animations-paused .potato-tuber,
      .review-animations-paused .pumpkin-rib,
      .review-animations-paused .strawberry-berry,
      .review-animations-paused .tomato-fruit {
        animation: none !important;
      }
      .state-name {
        font-size: 14px;
        font-weight: 600;
        color: #2c4130;
        margin: 0 0 4px;
      }
      .state-desc {
        font-size: 11px;
        color: #728475;
        margin: 0;
      }
      .controls {
        max-width: 1200px;
        margin: 0 auto 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .btn {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid #b8a978;
        border-radius: 6px;
        background: #fff8dc;
        color: #2c4130;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn:hover {
        background: #f2ebd1;
        border-color: #9f9160;
      }
      .btn.active {
        background: #4b9243;
        color: white;
        border-color: #3b7634;
      }
      @media (max-width: 520px) {
        body {
          padding: 16px;
        }
        h1 {
          font-size: 28px;
          line-height: 1.1;
        }
        p.subtitle {
          line-height: 1.45;
        }
        .review-container {
          gap: 28px;
        }
        .crop-section {
          padding: 14px;
        }
        .grid-states {
          grid-template-columns: 1fr;
        }
        .state-card {
          padding: 12px;
        }
        .crop-preview-wrapper {
          width: min(100%, 250px);
          height: 150px;
        }
        .crop-preview-wrapper svg.crop-art {
          width: 184px;
          height: 138px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Crop Art System Review</h1>
      <p class="subtitle">Trang kiểm duyệt và hiển thị tất cả các giai đoạn tăng trưởng, trạng thái đất của 7 loại cây trồng vector SVG/SCSS.</p>
    </header>

    <div class="controls">
      <button class="btn active" id="toggle-sway">Bật/Tắt Animation Đung Đưa</button>
    </div>

    <div class="review-container" id="review-container">
      <!-- Sẽ được điền động bằng JavaScript -->
    </div>

    <script type="module" src="/src/review.ts"></script>
  </body>
</html>
