<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Art System Review</title>
    <style>
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #fdfbf7;
        color: #2c4130;
        margin: 0;
        padding: 24px;
      }
      header {
        max-width: 1200px;
        margin: 0 auto 32px;
        border-bottom: 2px dashed #e8e3d3;
        padding-bottom: 16px;
      }
      h1 {
        margin: 0 0 8px;
        color: #1e5c2d;
      }
      p.subtitle {
        margin: 0;
        color: #667c69;
        font-size: 14px;
      }
      .review-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        gap: 36px;
      }
      .crop-section {
        background: #fff8dc;
        border: 1px solid #e8dec0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 12px rgba(44, 33, 15, 0.04);
      }
      .crop-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 16px;
        color: #2b541a;
        text-transform: capitalize;
        border-bottom: 1px solid rgba(184, 169, 120, 0.4);
        padding-bottom: 8px;
      }
      .grid-states {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      .state-card {
        background: #ffffff;
        border: 1px solid rgba(184, 169, 120, 0.24);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8);
      }
      .state-card:hover {
        border-color: #4b9243;
        box-shadow: 0 4px 8px rgba(75, 146, 67, 0.08);
      }
      .crop-preview-wrapper {
        position: relative;
        width: 160px;
        height: 120px;
        background: radial-gradient(circle at 50% 70%, #dcd6bc 0%, #c9c2a6 80%);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      /* Căn chỉnh chính xác SVG trong wrapper giống hệt iso-tile */
      .crop-preview-wrapper svg.crop-art {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 140px;
        height: 105px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .state-name {
        font-size: 14px;
        font-weight: 600;
        color: #2c4130;
        margin: 0 0 4px;
      }
      .state-desc {
        font-size: 11px;
        color: #728475;
        margin: 0;
      }
      .controls {
        max-width: 1200px;
        margin: 0 auto 20px;
        display: flex;
        gap: 12px;
      }
      .btn {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid #b8a978;
        border-radius: 6px;
        background: #fff8dc;
        color: #2c4130;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn:hover {
        background: #f2ebd1;
        border-color: #9f9160;
      }
      .btn.active {
        background: #4b9243;
        color: white;
        border-color: #3b7634;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Crop Art System Review</h1>
      <p class="subtitle">Trang kiểm duyệt và hiển thị tất cả các giai đoạn tăng trưởng, trạng thái đất của 7 loại cây trồng vector SVG/SCSS.</p>
    </header>

    <div class="controls">
      <button class="btn active" id="toggle-sway">Bật/Tắt Animation Đung Đưa</button>
    </div>

    <div class="review-container" id="review-container">
      <!-- Sẽ được điền động bằng JavaScript -->
    </div>

    <script type="module" src="/src/review.ts"></script>
  </body>
</html>
