<svg class="crop-art crop-art--carrot state-harvestable" viewBox="0 0 180 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Detailed carrot crop">
  <defs>
    <linearGradient id="carrotLeafGradient" x1="90" y1="10" x2="90" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#95d84c"/>
      <stop offset=".55" stop-color="#5aa534"/>
      <stop offset="1" stop-color="#2e772d"/>
    </linearGradient>
    <linearGradient id="carrotLeafDarkGradient" x1="90" y1="18" x2="90" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#70be3e"/>
      <stop offset="1" stop-color="#286b27"/>
    </linearGradient>
    <linearGradient id="carrotRootGradient" x1="46" y1="112" x2="142" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffad38"/>
      <stop offset=".52" stop-color="#f47a1f"/>
      <stop offset="1" stop-color="#d75d18"/>
    </linearGradient>
    <radialGradient id="carrotRootGlow" cx=".35" cy=".28" r=".72">
      <stop offset="0" stop-color="#ffbe55" stop-opacity=".68"/>
      <stop offset=".62" stop-color="#ff9428" stop-opacity=".2"/>
      <stop offset="1" stop-color="#c94f15" stop-opacity=".12"/>
    </radialGradient>
    <filter id="cropSoftShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="5" flood-color="#352411" flood-opacity=".28"/>
    </filter>
    <filter id="rootTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".08" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values=".25" result="mutedNoise"/>
      <feBlend in="SourceGraphic" in2="mutedNoise" mode="soft-light"/>
    </filter>
  </defs>

