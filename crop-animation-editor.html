<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Animation Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="animation-app">
      <header class="animation-header">
        <div class="animation-header__copy">
          <a class="animation-header__back" href="/crop-editor.html">Back to Crop Editor</a>
          <h1 id="animation-title">Crop Animation Editor</h1>
          <p id="animation-subtitle">Select a saved stage, classify SVG groups, and preview part animations.</p>
        </div>
        <div class="animation-header__actions">
          <div class="animation-crop-switcher">
            <label class="field-label" for="animation-crop-select">Crop</label>
            <select id="animation-crop-select" class="form-control" disabled>
              <option value="">Loading crops...</option>
            </select>
          </div>
          <button id="auto-classify-btn" class="btn btn-primary" disabled>Suggest Candidates</button>
          <button id="preview-animation-btn" class="btn btn-secondary" disabled>Preview Animation</button>
          <button id="save-animation-btn" class="btn btn-success" disabled>Save Grouped SVG</button>
        </div>
      </header>

      <main class="animation-layout">
        <aside class="animation-panel stage-panel">
          <h2>Stages</h2>
          <div id="animation-stage-list" class="animation-stage-list">
            <p class="animation-empty">Loading stages...</p>
          </div>
        </aside>

        <section class="animation-workspace">
          <div class="animation-toolbar">
            <div class="segmented-control" role="group" aria-label="Preview mode">
              <button class="mode-btn is-active" type="button" data-mode="normal">Normal</button>
              <button class="mode-btn" type="button" data-mode="overlay">Overlay</button>
              <button class="mode-btn" type="button" data-mode="solo">Solo</button>
            </div>
            <span id="animation-status" class="animation-status">Choose a stage to begin.</span>
          </div>

          <div id="svg-preview" class="crop-animation-preview mode-normal">
            <p class="animation-empty">No stage selected.</p>
          </div>
        </section>

        <aside class="animation-panel group-panel">
          <div class="panel-section selection-controls-section">
            <h2>Selection</h2>
            <div class="selection-tool-selector" style="margin: 10px 0;">
              <label class="field-label">Công cụ chọn</label>
              <div class="segmented-control" style="display: flex; width: 100%;">
                <button class="mode-btn is-active" type="button" data-tool="rect" id="tool-rect-btn" style="flex: 1; text-align: center;">Hộp</button>
                <button class="mode-btn" type="button" data-tool="brush" id="tool-brush-btn" style="flex: 1; text-align: center;">Tô</button>
                <button class="mode-btn" type="button" data-tool="lasso" id="tool-lasso-btn" style="flex: 1; text-align: center;">Lasso</button>
              </div>
            </div>
            <div class="selection-status" id="selection-status">Selected: 0 paths</div>
            <div class="selection-label-selector" style="margin: 8px 0;">
              <label class="field-label" for="selection-label-select">Target Label</label>
              <select id="selection-label-select" class="form-control">
                <option value="base">base</option>
                <option value="stem">stem</option>
                <option value="leaves">leaves</option>
                <option value="leaves-left">leaves-left</option>
                <option value="leaves-right">leaves-right</option>
                <option value="fruit">fruit</option>
                <option value="ears">ears</option>
                <option value="tassels">tassels</option>
                <option value="flower">flower</option>
                <option value="dead-leaf">dead-leaf</option>
                <option value="other">other</option>
              </select>
            </div>
            <div class="group-actions selection-actions" style="margin-top: 8px; display: flex; gap: 8px;">
              <button id="create-group-btn" class="btn btn-primary" style="flex: 1;" disabled>Create Group</button>
              <button id="remove-from-group-btn" class="btn btn-danger" style="flex: 1;" disabled>Remove Selection</button>
            </div>
          </div>

          <div class="panel-section">
            <h2>Groups</h2>
            <div class="group-actions">
              <button id="merge-groups-btn" class="btn btn-secondary" disabled>Merge Selected</button>
              <button id="split-left-right-btn" class="btn btn-secondary" disabled>Split L/R</button>
              <button id="split-top-bottom-btn" class="btn btn-secondary" disabled>Split T/B</button>
              <button id="split-color-btn" class="btn btn-secondary" disabled>Split Color</button>
            </div>
            <div id="group-list" class="group-list">
              <p class="animation-empty">Run Suggest Candidates to inspect groups.</p>
            </div>
          </div>


          <div class="panel-section">
            <h2>Animation</h2>
            <label class="field-label" for="animation-preset-select">Selected group preset</label>
            <select id="animation-preset-select" class="form-control" disabled></select>
          </div>

          <div class="panel-section">
            <h2>Pivot</h2>
            <label class="field-label" for="pivot-preset-select">Pivot preset</label>
            <select id="pivot-preset-select" class="form-control" disabled></select>
            <div class="pivot-grid">
              <label class="field-label" for="pivot-x-input">Pivot X %</label>
              <label class="field-label" for="pivot-y-input">Pivot Y %</label>
              <input id="pivot-x-input" class="form-control" type="number" min="0" max="100" step="1" value="50" disabled />
              <input id="pivot-y-input" class="form-control" type="number" min="0" max="100" step="1" value="100" disabled />
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/animation-editor.ts"></script>
  </body>
</html>
