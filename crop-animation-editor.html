<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Animation Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="animation-app">
      <header class="animation-header">
        <div class="animation-header__copy">
          <a class="animation-header__back" href="/crop-editor.html">Back to Crop Editor</a>
          <h1 id="animation-title">Crop Animation Editor</h1>
          <p id="animation-subtitle">Select a saved stage, classify SVG groups, and preview part animations.</p>
        </div>
        <div class="animation-header__actions">
          <div class="animation-crop-switcher">
            <label class="field-label" for="animation-crop-select">Crop</label>
            <select id="animation-crop-select" class="form-control" disabled>
              <option value="">Loading crops...</option>
            </select>
          </div>
          <button id="auto-classify-btn" class="btn btn-primary" type="button" disabled hidden>Suggest Candidates</button>
          <button id="preview-animation-btn" class="btn btn-secondary" disabled>Preview Animation</button>
          <button id="save-animation-btn" class="btn btn-success" disabled>Save Grouped SVG</button>
        </div>
      </header>

      <main class="animation-layout">
        <aside class="animation-panel layer-browser-panel">
          <div class="panel-section">
            <label class="field-label" for="animation-stage-select">Stage</label>
            <select id="animation-stage-select" class="form-control" disabled>
              <option value="">Loading stages...</option>
            </select>
          </div>
          <div class="panel-section" id="panel-groups">
            <h2>Layers</h2>
            <div id="group-list" class="group-list">
              <p class="animation-empty">Select a stage to inspect layers.</p>
            </div>
          </div>
        </aside>

        <aside class="animation-panel layer-properties-panel">
          <div class="panel-section">
            <h2>Layer Properties</h2>
            <div id="layer-properties" class="layer-properties">
              <p class="animation-empty">Select a layer to edit its properties.</p>
            </div>
          </div>
        </aside>

        <section class="animation-workspace">
          <div class="animation-toolbar">
            <div class="segmented-control" role="group" aria-label="Preview mode">
              <button class="mode-btn is-active" type="button" data-mode="normal">Normal</button>
              <button class="mode-btn" type="button" data-mode="overlay">Overlay</button>
              <button class="mode-btn" type="button" data-mode="solo">Solo</button>
            </div>
            <span id="animation-status" class="animation-status">Choose a stage to begin.</span>
          </div>

          <div id="svg-preview" class="crop-animation-preview mode-normal">
            <p class="animation-empty">No stage selected.</p>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/animation-editor.ts"></script>
  </body>
</html>
